{% extends 'base.html' %}
{% load static %}

{% block title %}CorpNexus — {{ msg }}{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'message.css' %}" />{% endblock %}

{% block content %}
<div class="container message-container">
  <div class="message-card glass-card animate-scale-in">
    <div class="message-icon success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="message-confetti" id="confetti"></div>
    <h1 class="message-title">Success!</h1>
    <p class="message-body">{{ msg }}</p>
    <div class="message-actions">
      <a href="/employee/view/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        View All Employees
      </a>
      <a href="/department/department_list/" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        View Departments
      </a>
      <a href="/" class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}<script src="{% static 'message.js' %}"></script>{% endblock %}
