{% extends 'base.html' %}
{% load static %}

{% block title %}CorpNexus — Delete Department{% endblock %}

{% block content %}
<div class="container" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 120px);">
  <div class="glass-card animate-scale-in" style="padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.25rem;">
    <div style="width:72px;height:72px;border-radius:50%;background:rgba(220,60,80,0.12);border:1px solid rgba(220,60,80,0.3);display:grid;place-items:center;padding:16px;color:var(--danger);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:100%;height:100%;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </div>
    <h2 style="font-size:1.4rem;font-weight:700;">Department Deleted</h2>
    <p style="color:var(--text-secondary);">Department ID <code style="font-family:var(--font-mono);color:var(--danger-light);">{{ dept_id }}</code> has been removed from the system.</p>
    <div style="display:flex;flex-direction:column;gap:0.6rem;width:100%;margin-top:0.5rem;">
      <a href="/department/department_list/" class="btn btn-primary" style="justify-content:center;">View All Departments</a>
      <a href="/" class="btn btn-outline" style="justify-content:center;">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
